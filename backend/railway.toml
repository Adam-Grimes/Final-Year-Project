[build]
# Force headless opencv after all installs, since ultralytics pulls in the
# full opencv-python (which needs libxcb/libGL not present on Railway).
buildCommand = "pip install -r requirements.txt && pip install opencv-python-headless==4.13.0.90 --force-reinstall"

[deploy]
startCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
