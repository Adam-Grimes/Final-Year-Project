name: frontend and backend tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  #JOB 1: BACKEND (Django)

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend  #Points to the backend folder

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 
          cache: 'pip' # Caches dependencies to speed up future runs

      - name: Install System Libs for Ultralytics
        run: sudo apt-get update && sudo apt-get install -y libgl1

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          # Install CPU-only torch/torchvision first so pip doesn't pull the
          # massive CUDA wheels when processing requirements.txt
          pip install torch==2.10.0 torchvision==0.25.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run Django Tests
        # This creates a separate .env for testing so the real secrets aren't needed
        run: |
          echo "DJANGO_SECRET_KEY=testing_key_123" > .env
          echo "DEBUG=True" >> .env
          echo "GOOGLE_API_KEY=fake_google_key_for_testing" >> .env

          python manage.py test api

  #JOB 2: FRONTEND (Expo)
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend #Points to  frontend folder

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Type Check (TypeScript)
        #checks for errors in TypeScript.
        run: npm run tsc --if-present

      - name: Run Tests
      
        run: npm test